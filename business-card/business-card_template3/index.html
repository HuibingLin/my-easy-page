<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Digital Business Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Digital Business Card Container -->
    <div class="business-card">
        
        <!-- Avatar Section -->
        <div class="avatar-section">
            <img src="preview-images/image1.png" alt="Your Photo" class="avatar">
        </div>

        <!-- Content Section -->
        <div class="content-section">
            <!-- Name and Title -->
            <h1 class="name">Your Name</h1>
            <p class="title">Your Professional Title</p>
            
            <!-- Divider -->
            <div class="divider"></div>
            
            <!-- Contact Information -->
            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-label">Email</span>
                    <span class="contact-value">your.email@example.com</span>
                </div>
                <div class="contact-item">
                    <span class="contact-label">Phone</span>
                    <span class="contact-value">+1 (555) 123-4567</span>
                </div>
                <div class="contact-item">
                    <span class="contact-label">Location</span>
                    <span class="contact-value">Your City, Country</span>
                </div>
            </div>

            <!-- Social Media Links -->
            <div class="social-links">
                <a href="https://linkedin.com/in/yourname" class="social-link" target="_blank" title="LinkedIn">LinkedIn</a>
                <a href="https://github.com/yourname" class="social-link" target="_blank" title="GitHub">GitHub</a>
                <a href="https://twitter.com/yourname" class="social-link" target="_blank" title="Twitter">Twitter</a>
                <a href="https://yourwebsite.com" class="social-link" target="_blank" title="Website">Website</a>
            </div>
        </div>
    </div>
</body>
</html>
